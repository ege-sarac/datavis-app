<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time-Series Forecast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">Configure Time-Series Forecast</h1>

    <form action="{{ url_for('render_timeseries') }}" method="POST" class="card p-4 shadow-sm">
        <input type="hidden" name="filepath" value="{{ filepath }}">

        <div class="mb-3">
            <label for="date_col" class="form-label">Date/Time Column</label>
            <select name="date_col" id="date_col" class="form-select" required>
                {% for col in all_columns %}
                    <option value="{{ col }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="value_col" class="form-label">Numeric Column to Forecast</label>
            <select name="value_col" id="value_col" class="form-select" required>
                {% for col in numeric_columns %}
                    <option value="{{ col }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="forecast_horizon" class="form-label">Forecast Horizon (how many steps?)</label>
            <input type="number" name="forecast_horizon" id="forecast_horizon" class="form-control" min="1" max="100" value="10" required>
        </div>

        <button type="submit" class="btn btn-primary">Generate Forecast</button>
    </form>
</div>
</body>
</html>
