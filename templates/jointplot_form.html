<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jointplot Options</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">Configure Jointplot</h1>

    <form action="{{ url_for('render_jointplot') }}" method="POST" class="card p-4 shadow-sm">
        <!-- Hidden input to carry file info -->
        <input type="hidden" name="filepath" value="{{ filepath }}">

        <div class="mb-3">
            <label for="x_axis" class="form-label">X-Axis (numeric)</label>
            <select name="x_axis" id="x_axis" class="form-select" required>
                {% for col in numeric_columns %}
                    <option value="{{ col }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="y_axis" class="form-label">Y-Axis (numeric)</label>
            <select name="y_axis" id="y_axis" class="form-select" required>
                {% for col in numeric_columns %}
                    <option value="{{ col }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="hue" class="form-label">Hue Column (optional)</label>
            <select name="hue" id="hue" class="form-select">
                <option value="">None</option>
                {% for col in all_columns %}
                    <option value="{{ col }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="color" class="form-label">Color</label>
            <select name="color" id="color" class="form-select">
                <option value="red">red</option>
                <option value="blue">blue</option>
                <option value="black">black</option>
                <option value="grey">grey</option>
                <option value="purple">purple</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="kind" class="form-label">Kind</label>
            <select name="kind" id="kind" class="form-select">
                <option value="scatter">scatter</option>
                <option value="kde">kde</option>
                <option value="hex">hex</option>
                <option value="hist">hist</option>
                <option value="reg">reg</option>
                <option value="resid">resid</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Generate Jointplot</button>
    </form>
</div>
</body>
</html>
