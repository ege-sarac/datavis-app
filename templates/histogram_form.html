<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Histogram Options</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h1 class="mb-4">Configure Histogram</h1>

    <form action="{{ url_for('render_histogram') }}" method="POST" class="card p-4 shadow-sm">
        <!-- Hidden input to carry file info -->
        <input type="hidden" name="filepath" value="{{ filepath }}">

        <div class="mb-3">
            <label for="hist_column" class="form-label">Column to Plot (numeric)</label>
            <select name="hist_column" id="hist_column" class="form-select" required>
                {% for col in numeric_columns %}
                    <option value="{{ col }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="hist_hue" class="form-label">Hue Column (optional)</label>
            <select name="hist_hue" id="hist_hue" class="form-select">
                <option value="">None</option>
                {% for col in all_columns %}
                    <option value="{{ col }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="hist_bins" class="form-label">Number of Bins</label>
            <input type="number" class="form-control" name="hist_bins" id="hist_bins" value="20" min="1" required>
        </div>

        <div class="mb-3">
            <label for="hist_color" class="form-label">Color</label>
            <select name="hist_color" id="hist_color" class="form-select">
                <option value="red">red</option>
                <option value="blue">blue</option>
                <option value="black">black</option>
                <option value="grey">grey</option>
                <option value="purple">purple</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Generate Histogram</button>
    </form>
</div>
</body>
</html>
